{{- if .Values.webhookSigning.generateSecret }}
{{- $secretName := include "postal-sendgrid.webhookSigningSecretName" . }}
{{- $secretKey := .Values.webhookSigning.privateKeySecretKey }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingPrivateKey := "" }}
{{- if and $existingSecret (hasKey $existingSecret.data $secretKey) }}
{{- $existingPrivateKey = index $existingSecret.data $secretKey | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "postal-sendgrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $secretKey }}: {{ default (genPrivateKey "ecdsa") $existingPrivateKey | quote }}
{{- end }}
