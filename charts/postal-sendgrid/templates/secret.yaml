{{- if and .Values.secret.create (not .Values.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postal-sendgrid.secretName" . }}
  labels:
    {{- include "postal-sendgrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  SHIM_AUTH_TOKEN: {{ required "secret.shimAuthToken is required when secret.create is true" .Values.secret.shimAuthToken | quote }}
  POSTAL_API_KEY: {{ required "secret.postalApiKey is required when secret.create is true" .Values.secret.postalApiKey | quote }}
  {{- if and (not .Values.webhookSigning.generateSecret) (eq (toString .Values.env.webhookSigningEnabled) "true") }}
  WEBHOOK_SIGNING_PRIVATE_KEY: {{ required "secret.webhookSigningPrivateKey is required when webhook signing is enabled and webhookSigning.generateSecret is false" .Values.secret.webhookSigningPrivateKey | quote }}
  {{- else if .Values.secret.webhookSigningPrivateKey }}
  WEBHOOK_SIGNING_PRIVATE_KEY: {{ .Values.secret.webhookSigningPrivateKey | quote }}
  {{- end }}
{{- end }}
