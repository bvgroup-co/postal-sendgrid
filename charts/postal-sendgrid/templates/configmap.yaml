apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postal-sendgrid.fullname" . }}
  labels:
    {{- include "postal-sendgrid.labels" . | nindent 4 }}
data:
  LISTEN_ADDR: {{ .Values.env.listenAddr | quote }}
  DATABASE_PATH: {{ .Values.env.databasePath | quote }}
  MAIL_MAX_BYTES: {{ .Values.env.mailMaxBytes | quote }}
  WEBHOOK_MAX_BYTES: {{ .Values.env.webhookMaxBytes | quote }}
  HTTP_TIMEOUT: {{ .Values.env.httpTimeout | quote }}
  FORWARD_ATTEMPTS: {{ .Values.env.forwardAttempts | quote }}
  FORWARD_BACKOFF: {{ .Values.env.forwardBackoff | quote }}
  DNS_CHECK_ENABLED: {{ .Values.env.dnsCheckEnabled | quote }}
  POSTAL_CNAME_VALUE: {{ .Values.env.postalCNAMEValue | quote }}
  WEBHOOK_SIGNING_ENABLED: {{ .Values.env.webhookSigningEnabled | quote }}
  POSTAL_BASE_URL: {{ required "config.postalBaseUrl is required" .Values.config.postalBaseUrl | quote }}
  PLUNK_WEBHOOK_BASE_URL: {{ required "config.plunkWebhookBaseUrl is required" .Values.config.plunkWebhookBaseUrl | quote }}
