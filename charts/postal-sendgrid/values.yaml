replicaCount: 1

image:
  repository: ghcr.io/bvgroup-co/postal-sendgrid
  pullPolicy: IfNotPresent
  tag: v0.1.0

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 8080
  targetPort: http
  annotations: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  annotations: {}

storagePath: /data

env:
  listenAddr: :8080
  databasePath: /data/postal-sendgrid.db
  mailMaxBytes: "15728640"
  webhookMaxBytes: "1048576"
  httpTimeout: 10s
  forwardAttempts: "4"
  forwardBackoff: 250ms
  dnsCheckEnabled: "false"
  postalCNAMEValue: postal.example.invalid
  webhookSigningEnabled: "true"

config:
  postalBaseUrl: ""
  plunkWebhookBaseUrl: ""

secret:
  create: true
  name: ""
  shimAuthToken: ""
  postalApiKey: ""
  webhookSigningPrivateKey: ""

existingSecret:
  name: ""
  keys:
    shimAuthToken: SHIM_AUTH_TOKEN
    postalApiKey: POSTAL_API_KEY
    webhookSigningPrivateKey: WEBHOOK_SIGNING_PRIVATE_KEY

webhookSigning:
  generateSecret: false
  generatedSecretName: ""
  privateKeySecretKey: WEBHOOK_SIGNING_PRIVATE_KEY

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
