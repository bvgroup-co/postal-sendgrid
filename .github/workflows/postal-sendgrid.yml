name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Go, Docker, and Helm validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: CGO_ENABLED=0 go test ./...

      - name: Run vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint charts/postal-sendgrid \
            --set config.postalBaseUrl=https://postal.example.com \
            --set config.plunkWebhookBaseUrl=https://plunk.example.com \
            --set secret.shimAuthToken=shim-token \
            --set secret.postalApiKey=postal-api-key \
            --set secret.webhookSigningPrivateKey=fixture-signing-key

      - name: Render Helm chart
        run: |
          helm template postal-sendgrid charts/postal-sendgrid \
            --set config.postalBaseUrl=https://postal.example.com \
            --set config.plunkWebhookBaseUrl=https://plunk.example.com \
            --set secret.shimAuthToken=shim-token \
            --set secret.postalApiKey=postal-api-key \
            --set secret.webhookSigningPrivateKey=fixture-signing-key
